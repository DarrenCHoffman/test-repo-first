<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiiroitori Space Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 1.4rem;
      color: #ffe066;
      letter-spacing: 2px;
    }
    #gameCanvas {
      border: 2px solid #ffe066;
      border-radius: 4px;
      display: block;
    }
    #ui {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #aaa;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
    }
    #overlay h2 { font-size: 2rem; color: #ffe066; }
    #overlay p  { font-size: 1rem; color: #ccc; }
  </style>
</head>
<body>
  <h1>🐦 Kiiroitori Space Shooter 🚀</h1>
  <div style="position:relative;">
    <canvas id="gameCanvas" width="480" height="600"></canvas>
    <div id="overlay">
      <h2 id="overlayTitle">KIIROITORI</h2>
      <p id="overlayMsg">Press SPACE or tap to start</p>
    </div>
  </div>
  <div id="ui">← → to move &nbsp;|&nbsp; SPACE to shoot &nbsp;|&nbsp; Mobile: tap left/right halves</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const overlay      = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMsg   = document.getElementById('overlayMsg');

// ── State ────────────────────────────────────────────────────────────────────
let state = 'start'; // 'start' | 'playing' | 'dead'
let score = 0, lives = 3, wave = 1;

// ── Stars ────────────────────────────────────────────────────────────────────
const STAR_COUNT = 80;
const stars = Array.from({ length: STAR_COUNT }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.5 + 0.3,
  speed: Math.random() * 0.6 + 0.2,
  alpha: Math.random() * 0.6 + 0.4
}));

function updateStars() {
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  });
}
function drawStars() {
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.fill();
  });
}

// ── Player ───────────────────────────────────────────────────────────────────
const PLAYER_SPEED = 4;
const player = { x: W / 2, y: H - 80, w: 44, h: 52, invincible: 0 };

/** Draw Kiiroitori — a round yellow bird holding a laser gun */
function drawBird(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // ── tail feathers ──
  ctx.fillStyle = '#f5c800';
  ctx.beginPath();
  ctx.moveTo(-8, 22);
  ctx.lineTo(-14, 36);
  ctx.lineTo(-4, 28);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(8, 22);
  ctx.lineTo(14, 36);
  ctx.lineTo(4, 28);
  ctx.closePath();
  ctx.fill();

  // ── body ──
  ctx.fillStyle = '#ffe033';
  ctx.beginPath();
  ctx.ellipse(0, 10, 20, 24, 0, 0, Math.PI * 2);
  ctx.fill();
  // body outline
  ctx.strokeStyle = '#d4a800';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── belly patch ──
  ctx.fillStyle = '#fff5b0';
  ctx.beginPath();
  ctx.ellipse(2, 16, 10, 13, 0.15, 0, Math.PI * 2);
  ctx.fill();

  // ── left tiny wing ──
  ctx.fillStyle = '#f5c800';
  ctx.beginPath();
  ctx.ellipse(-20, 8, 8, 5, -0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#d4a800';
  ctx.lineWidth = 1;
  ctx.stroke();

  // ── right wing — holding the laser gun ──
  ctx.fillStyle = '#f5c800';
  ctx.beginPath();
  ctx.ellipse(18, 6, 8, 5, 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#d4a800';
  ctx.lineWidth = 1;
  ctx.stroke();

  // ── laser gun (right side) ──
  // barrel
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.roundRect(14, -4, 18, 6, 2);
  ctx.fill();
  // barrel tip glow
  ctx.fillStyle = '#0ff';
  ctx.beginPath();
  ctx.arc(32, -1, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 6;
  ctx.fill();
  ctx.shadowBlur = 0;
  // handle
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.roundRect(16, 2, 7, 9, 2);
  ctx.fill();
  // energy cell (glowing)
  ctx.fillStyle = '#39f';
  ctx.beginPath();
  ctx.roundRect(20, -2, 5, 4, 1);
  ctx.fill();
  ctx.shadowColor = '#39f';
  ctx.shadowBlur = 4;
  ctx.fill();
  ctx.shadowBlur = 0;

  // ── head ──
  ctx.fillStyle = '#ffe033';
  ctx.beginPath();
  ctx.arc(0, -14, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#d4a800';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── top tuft ──
  ctx.fillStyle = '#f5c800';
  ctx.beginPath();
  ctx.moveTo(-3, -29);
  ctx.quadraticCurveTo(-5, -36, 0, -32);
  ctx.quadraticCurveTo(4, -38, 5, -30);
  ctx.quadraticCurveTo(2, -28, -3, -29);
  ctx.fill();

  // ── eyes ──
  // whites
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-5, -16, 5, 6, -0.1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5, -16, 5, 6,  0.1, 0, Math.PI * 2); ctx.fill();
  // pupils
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-5, -15, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 5, -15, 2.5, 0, Math.PI * 2); ctx.fill();
  // eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-4, -16, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 6, -16, 1, 0, Math.PI * 2); ctx.fill();

  // ── beak ──
  ctx.fillStyle = '#ff9800';
  ctx.beginPath();
  ctx.moveTo(-4, -10);
  ctx.lineTo(4, -10);
  ctx.lineTo(1, -6);
  ctx.lineTo(-1, -6);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#e65c00';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  ctx.restore();
}

// ── Lasers ───────────────────────────────────────────────────────────────────
const LASER_SPEED = 10;
const LASER_COOLDOWN = 12; // frames
let laserCooldown = 0;
const lasers = [];

function fireLaser() {
  if (laserCooldown > 0) return;
  lasers.push({ x: player.x + 22, y: player.y - 10 }); // tip of gun
  laserCooldown = LASER_COOLDOWN;
}

function updateLasers() {
  if (laserCooldown > 0) laserCooldown--;
  for (let i = lasers.length - 1; i >= 0; i--) {
    lasers[i].y -= LASER_SPEED;
    if (lasers[i].y < -10) lasers.splice(i, 1);
  }
}

function drawLasers() {
  lasers.forEach(l => {
    // glow
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 8;
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(l.x, l.y - 14);
    ctx.stroke();
    // bright core
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(l.x, l.y - 14);
    ctx.stroke();
    ctx.shadowBlur = 0;
  });
}

// ── Aliens ───────────────────────────────────────────────────────────────────
const ALIEN_ROWS = 3, ALIEN_COLS = 8;
const ALIEN_W = 36, ALIEN_H = 28;
let aliens = [], alienDir = 1, alienSpeed = 0.8, alienDropTimer = 0;

const ALIEN_TYPES = [
  { color: '#f55', eye: '#ff0', legs: 3 },  // row 0 – red
  { color: '#c0f', eye: '#0ff', legs: 2 },  // row 1 – purple
  { color: '#0cf', eye: '#ff0', legs: 2 },  // row 2 – cyan
];

function spawnAliens() {
  aliens = [];
  for (let r = 0; r < ALIEN_ROWS; r++) {
    for (let c = 0; c < ALIEN_COLS; c++) {
      aliens.push({
        x: 60 + c * 50,
        y: 60 + r * 50,
        type: r,
        alive: true,
        animFrame: 0,
        animTimer: 0
      });
    }
  }
}

function drawAlien(a) {
  const t = ALIEN_TYPES[a.type];
  const frame = a.animFrame; // 0 or 1
  ctx.save();
  ctx.translate(a.x, a.y);

  // body
  ctx.fillStyle = t.color;
  ctx.beginPath();
  ctx.ellipse(0, 0, 14, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // head dome
  ctx.beginPath();
  ctx.ellipse(0, -8, 10, 9, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // eyes
  ctx.fillStyle = t.eye;
  ctx.beginPath(); ctx.arc(-5, -8, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 5, -8, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-5, -8, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 5, -8, 1.5, 0, Math.PI * 2); ctx.fill();

  // legs/tentacles (animated)
  ctx.strokeStyle = t.color;
  ctx.lineWidth = 2;
  const legCount = t.legs; // always 2 or 3 based on ALIEN_TYPES config
  for (let i = 0; i < legCount; i++) {
    const lx = -8 + i * (16 / (legCount - 1));
    const wiggle = frame === 0 ? 4 : -4;
    ctx.beginPath();
    ctx.moveTo(lx, 8);
    ctx.quadraticCurveTo(lx + (i % 2 === 0 ? wiggle : -wiggle), 18, lx, 22);
    ctx.stroke();
  }

  // glow outline
  ctx.shadowColor = t.color;
  ctx.shadowBlur = 8;
  ctx.strokeStyle = t.color;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(0, 0, 14, 10, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.restore();
}

function updateAliens(dt) {
  const alive = aliens.filter(a => a.alive);
  if (!alive.length) {
    wave++;
    alienSpeed = Math.min(0.8 + wave * 0.3, 4);
    spawnAliens();
    return;
  }

  // animate
  alive.forEach(a => {
    a.animTimer++;
    if (a.animTimer > 30) { a.animFrame = 1 - a.animFrame; a.animTimer = 0; }
  });

  // move side to side
  const leftmost  = Math.min(...alive.map(a => a.x)) - ALIEN_W / 2;
  const rightmost = Math.max(...alive.map(a => a.x)) + ALIEN_W / 2;

  if (rightmost >= W - 10) {
    alienDir = -1;
    aliens.forEach(a => { if (a.alive) a.y += ALIEN_DROP_DISTANCE; });
  }
  if (leftmost <= 10) {
    alienDir = 1;
    aliens.forEach(a => { if (a.alive) a.y += ALIEN_DROP_DISTANCE; });
  }

  alive.forEach(a => a.x += alienDir * alienSpeed);

  // alien bombs
  if (Math.random() < ALIEN_BOMB_PROBABILITY * alive.length) {
    const shooter = alive[Math.floor(Math.random() * alive.length)];
    alienBombs.push({ x: shooter.x, y: shooter.y + 12 });
  }
}

// ── Alien bombs ──────────────────────────────────────────────────────────────
const BOMB_SPEED = 3;
const ALIEN_DROP_DISTANCE = 18;   // pixels dropped when hitting a wall
const ALIEN_BOMB_PROBABILITY = 0.004; // per-alien chance of firing each frame
const alienBombs = [];

function updateBombs() {
  for (let i = alienBombs.length - 1; i >= 0; i--) {
    alienBombs[i].y += BOMB_SPEED;
    if (alienBombs[i].y > H + 10) alienBombs.splice(i, 1);
  }
}

function drawBombs() {
  alienBombs.forEach(b => {
    ctx.shadowColor = '#f80';
    ctx.shadowBlur = 6;
    ctx.fillStyle = '#f80';
    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  });
}

// ── Explosions ───────────────────────────────────────────────────────────────
const explosions = [];

function spawnExplosion(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    explosions.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 40,
      maxLife: 40,
      r: Math.random() * 3 + 1,
      color
    });
  }
}

function updateExplosions() {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const e = explosions[i];
    e.x += e.vx; e.y += e.vy; e.life--;
    if (e.life <= 0) explosions.splice(i, 1);
  }
}

function drawExplosions() {
  explosions.forEach(e => {
    const alpha = e.life / e.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ── Collision helpers ─────────────────────────────────────────────────────────
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx, Math.min(cx, rx + rw));
  const nearY = Math.max(ry, Math.min(cy, ry + rh));
  return (cx - nearX) ** 2 + (cy - nearY) ** 2 < cr ** 2;
}

// ── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD() {
  ctx.fillStyle = '#ffe066';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`Score: ${score}`, 10, 24);
  ctx.textAlign = 'right';
  ctx.fillText(`Wave: ${wave}`, W - 10, 24);

  // lives as little birds (centered under score row)
  const LIFE_ICON_SCALE = 0.4;
  const LIFE_ICON_SPACING = 56; // px in scaled space
  const scaleInverse = 1 / LIFE_ICON_SCALE;
  const centerX = (W * scaleInverse) / 2;
  const startX  = centerX - ((lives - 1) * LIFE_ICON_SPACING) / 2;
  for (let i = 0; i < lives; i++) {
    ctx.save();
    ctx.scale(LIFE_ICON_SCALE, LIFE_ICON_SCALE);
    drawBird(startX + i * LIFE_ICON_SPACING, 50);
    ctx.restore();
  }
}

// ── Input ────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'start' || state === 'dead') startGame();
    else fireLaser();
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'start' || state === 'dead') { startGame(); return; }
  const touch = e.touches[0];
  const rect  = canvas.getBoundingClientRect();
  const tx    = touch.clientX - rect.left;
  if (tx < W / 2) keys['ArrowLeft'] = true;
  else            keys['ArrowRight'] = true;
  fireLaser();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  keys['ArrowLeft'] = false;
  keys['ArrowRight'] = false;
}, { passive: false });

// ── Game flow ─────────────────────────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; wave = 1; alienSpeed = 0.8;
  player.x = W / 2; player.invincible = 0;
  lasers.length = 0; alienBombs.length = 0; explosions.length = 0;
  spawnAliens();
  state = 'playing';
  overlay.style.display = 'none';
}

// ── Main loop ────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = ts - lastTime; lastTime = ts;
  requestAnimationFrame(loop);

  // ── background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);
  updateStars(); drawStars();

  if (state !== 'playing') return;

  // ── player movement
  if (keys['ArrowLeft']  || keys['KeyA']) player.x -= PLAYER_SPEED;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += PLAYER_SPEED;
  player.x = Math.max(28, Math.min(W - 28, player.x));

  // ── auto-fire with held space
  if (keys['Space']) fireLaser();

  // ── updates
  updateLasers();
  updateAliens(dt);
  updateBombs();
  updateExplosions();

  // ── laser vs alien collision
  for (let li = lasers.length - 1; li >= 0; li--) {
    const l = lasers[li];
    for (let ai = 0; ai < aliens.length; ai++) {
      const a = aliens[ai];
      if (!a.alive) continue;
      if (circleRect(l.x, l.y, 4, a.x - 15, a.y - 14, 30, 28)) {
        a.alive = false;
        lasers.splice(li, 1);
        score += 10 * wave;
        spawnExplosion(a.x, a.y, ALIEN_TYPES[a.type].color);
        break;
      }
    }
  }

  // ── bomb vs player collision
  if (player.invincible <= 0) {
    for (let bi = alienBombs.length - 1; bi >= 0; bi--) {
      const b = alienBombs[bi];
      if (circleRect(b.x, b.y, 5, player.x - 20, player.y - 26, 40, 52)) {
        alienBombs.splice(bi, 1);
        lives--;
        spawnExplosion(player.x, player.y, '#ffe033');
        player.invincible = 120;
        if (lives <= 0) { gameOver(); return; }
      }
    }
  } else {
    player.invincible--;
  }

  // ── alien reaches bottom
  aliens.forEach(a => {
    if (a.alive && a.y > H - 60) { gameOver(); }
  });

  // ── draw
  drawLasers();
  aliens.filter(a => a.alive).forEach(drawAlien);
  drawBombs();
  drawExplosions();

  // player flicker when invincible
  if (player.invincible <= 0 || Math.floor(player.invincible / 6) % 2 === 0) {
    drawBird(player.x, player.y);
  }

  drawHUD();
}

function gameOver() {
  state = 'dead';
  overlayTitle.textContent = 'GAME OVER';
  overlayMsg.textContent   = `Score: ${score} — Press SPACE to retry`;
  overlay.style.display    = 'flex';
}

// kick off
requestAnimationFrame(loop);
</script>
</body>
</html>
